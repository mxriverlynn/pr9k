name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ralph-tui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache-dependency-path: ralph-tui/go.sum

      - name: Run tests
        run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ralph-tui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache-dependency-path: ralph-tui/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ralph-tui

  format:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ralph-tui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache-dependency-path: ralph-tui/go.sum

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

  vet:
    name: Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ralph-tui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache-dependency-path: ralph-tui/go.sum

      - name: go vet
        run: go vet ./...

  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ralph-tui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache-dependency-path: ralph-tui/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  mod-tidy:
    name: Module Tidiness
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ralph-tui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache-dependency-path: ralph-tui/go.sum

      - name: Check go mod tidy
        run: |
          if [ ! -f go.sum ]; then
            echo "go.sum does not exist — skipping mod tidy check"
            exit 0
          fi
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "go.mod or go.sum is not tidy — run 'go mod tidy' and commit"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache-dependency-path: ralph-tui/go.sum

      - name: Build
        run: make build
